name: "Tracely"
version: "3.1.0"
slug: "tracely"
description: "Offline causal event tracing for Home Assistant — see human-readable, searchable, interactive causal trees and timelines of everything that happened."
url: "https://github.com/nitish-mp3/tracely"
arch:
  - amd64
  - aarch64
  - armhf
  - armv7
init: false
startup: services
boot: auto
homeassistant_api: true
hassio_api: true
host_network: true
panel_admin: true
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "Tracely Web UI and API"
map:
  - data:rw
options:
  purge_keep_days: 30
  log_level: "info"
  redact_pii: true
  ha_token: ""
  backfill_days: 7
schema:
  purge_keep_days: int(1,365)
  log_level: list(debug|info|warning|error)
  redact_pii: bool
  ha_token: str?
  backfill_days: int(0,30)
ingress: true
ingress_port: 8765
panel_icon: "mdi:shield-lock"
panel_title: "Tracely"
